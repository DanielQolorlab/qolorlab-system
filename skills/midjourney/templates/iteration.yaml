# Basin Navigation System — Iteration Entry
# Append one block per generation into the active session file.
# Every field requires a value, "null: [reason]", or "delegated".

iteration:
  id: ""              # [session_id]-[nn], e.g. abc123-01
  model_version: ""   # must match or explicitly override session system_lock.model_version
  seed: 0
  variable_changed: ""      # layer and parameter name changed from previous iteration
                            # "none" for the first iteration in a session
  change_description: ""    # what changed, the specific new value, and why

  prompt:

    # Layer 1 — Basin Anchors
    subject_anchor: ""
    medium_anchor: ""
    sref: ""
    cref: ""                  # url or "null: [reason]"

    # Layer 2 — Subject Specification
    subject_detail: ""
    action_or_state: ""

    # Layer 3 — Environment
    environment: ""
    time_of_day: ""           # value or "null: [reason]"
    weather_or_atmosphere: "" # value or "null: [reason]"

    # Layer 4 — Style Dimensions
    lighting_quality: ""
    lighting_direction: ""
    colour_palette: ""
    colour_temperature: ""    # warm / neutral / cold
    era: ""                   # value or "null: timeless"
    mood_register: ""         # one word, or "delegated"

    # Layer 5 — Camera and Composition
    focal_length: ""
    depth_of_field: ""        # shallow / deep / fully sharp
    framing: ""
    composition_type: ""

    # Layer 6 — Model Delegation
    # List any dimensions handed to the model. Must not have a token assigned in the prompt.
    delegated_dimensions: []
    # Example:
    # delegated_dimensions:
    #   - dimension: colour_palette
    #     reason: sref is authoritative for colour

    # Layer 7 — Exclusions
    no_tokens: []             # empty list if nothing to exclude

  # Exact string submitted to Midjourney — verbatim, copy/paste.
  full_prompt_string: ""

  result:
    output_url: ""
    selected_variant: ""      # A / B / C / D / none
    upscaled: false
    verdict: ""               # keep / discard / iterate
    basin_assessment: ""      # correct / drifted / wrong
    dimension_failures: []    # list of dimension names that did not match intent
    next_variable: ""         # required if verdict is "iterate"
    notes: ""
